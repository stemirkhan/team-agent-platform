name: team-agent-platform

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-team_agent_platform}
      POSTGRES_USER: ${POSTGRES_USER:-team_agent_platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-team_agent_platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-team_agent_platform} -d ${POSTGRES_DB:-team_agent_platform}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-team_agent_platform}:${POSTGRES_PASSWORD:-team_agent_platform}@postgres:5432/${POSTGRES_DB:-team_agent_platform}
      REDIS_URL: redis://redis:6379/0
      HOST_EXECUTOR_BASE_URL: ${HOST_EXECUTOR_BASE_URL:-http://host.containers.internal:8765}
      CORS_ORIGINS: "[\"http://localhost:${WEB_PORT:-3000}\",\"http://127.0.0.1:${WEB_PORT:-3000}\",\"http://[::1]:${WEB_PORT:-3000}\"]"
    working_dir: /workspace/apps/backend
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ../../apps/backend:/workspace/apps/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}/api/v1
      API_BASE_URL: http://backend:8000/api/v1
    working_dir: /workspace/apps/web
    command: >
      sh -c "npm install &&
      npm run dev -- --hostname 0.0.0.0 --port 3000"
    volumes:
      - ../../apps/web:/workspace/apps/web
      - web_node_modules:/workspace/apps/web/node_modules
      - web_next_cache:/workspace/apps/web/.next
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:
  redis_data:
  web_node_modules:
  web_next_cache:
